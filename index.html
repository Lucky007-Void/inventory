<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOOD Admin Minimal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        
        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(23, 28, 41, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, var(--bg));
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 440px; }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        h2 {
            margin: 0 0 24px 0;
            font-weight: 600;
            font-size: 20px;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            display: block;
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 10px 15px -3px var(--accent-glow);
        }

        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-primary:active { transform: translateY(0); }

        /* Key Item List */
        .key-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .key-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .key-id { font-family: monospace; font-weight: 600; font-size: 16px; }
        .key-timer { font-size: 12px; color: var(--accent); font-weight: 500; }

        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr 44px; gap: 8px; }

        .btn-sm {
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-sm:hover { background: rgba(255, 255, 255, 0.1); }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .btn-del:hover { background: var(--danger); color: #fff; }

        .input-qty {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0;
            text-align: center;
            margin: 0;
            height: 34px;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="toast">Saved Successfully</div>

<div class="container">
    <div id="login-screen" class="card">
        <h2>JOOD PANEL</h2>
        <span class="label">Password</span>
        <input type="password" id="adminPass" placeholder="••••">
        <button class="btn-primary" onclick="checkLogin()">Login</button>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="card">
            <h2>Management</h2>
            <span class="label">Duration</span>
            <select id="duration">
                <option value="1">1 Day</option>
                <option value="7">7 Days</option>
                <option value="30">30 Days</option>
            </select>
            <button class="btn-primary" onclick="generateAndSave()">Generate Key</button>
        </div>

        <div id="list-container"></div>
    </div>
</div>

<script>
    const DB_URL = "https://jood-af2d8-default-rtdb.asia-southeast1.firebasedatabase.app/keys";
    const DB_SECRET = "JXRzMTiI2hQo9rps823i8guY5y14fxWPUeFDO5oU";
    const ADMIN_PASS = "1122"; 

    let allKeys = {};

    function checkLogin() {
        if (document.getElementById('adminPass').value === ADMIN_PASS) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            startDataSync();
        } else { alert("Wrong Password"); }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function getCountdown(expiry) {
        const diff = expiry - Math.floor(Date.now() / 1000);
        if (diff <= 0) return "EXPIRED";
        const d = Math.floor(diff / 86400), h = Math.floor((diff % 86400) / 3600), m = Math.floor((diff % 3600) / 60);
        return `${d}d ${h}h ${m}m`;
    }

    async function fetchKeys() {
        try {
            const res = await fetch(`${DB_URL}.json?auth=${DB_SECRET}`);
            allKeys = await res.json() || {};
            renderList();
        } catch (e) {}
    }

    function renderList() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        const now = Math.floor(Date.now() / 1000);
        Object.keys(allKeys).reverse().forEach(id => {
            const item = allKeys[id];
            if (item.expiry <= now) { deleteKey(id, true); return; }

            const div = document.createElement('div');
            div.className = 'key-item';
            div.innerHTML = `
                <div class="key-info">
                    <span class="key-id">${id}</span>
                    <span class="key-timer" id="timer-${id}">${getCountdown(item.expiry)}</span>
                </div>
                <div class="actions">
                    <input type="number" class="input-qty" id="val-${id}" value="1">
                    <button class="btn-sm" onclick="updateTime('${id}', ${item.expiry}, 'add')">+ Day</button>
                    <button class="btn-sm" onclick="updateTime('${id}', ${item.expiry}, 'sub')">- Day</button>
                    <button class="btn-sm btn-del" onclick="deleteKey('${id}')">✕</button>
                </div>`;
            container.appendChild(div);
        });
    }

    setInterval(() => {
        for (let id in allKeys) {
            const el = document.getElementById(`timer-${id}`);
            if (el) el.innerText = getCountdown(allKeys[id].expiry);
        }
    }, 10000);

    async function startDataSync() { await fetchKeys(); setInterval(fetchKeys, 15000); }

    async function generateAndSave() {
        const key = 'JOOD-' + Math.random().toString(36).substring(2, 7).toUpperCase();
        const expiry = Math.floor(Date.now() / 1000) + (parseInt(document.getElementById('duration').value) * 86400);
        await fetch(`${DB_URL}/${key}.json?auth=${DB_SECRET}`, { method: 'PUT', body: JSON.stringify({ expiry }) });
        showToast("Key Generated"); fetchKeys();
    }

    async function updateTime(key, currentExpiry, mode) {
        const days = parseInt(document.getElementById(`val-${key}`).value) || 0;
        const newExpiry = mode === 'add' ? currentExpiry + (days * 86400) : currentExpiry - (days * 86400);
        await fetch(`${DB_URL}/${key}/expiry.json?auth=${DB_SECRET}`, { method: 'PUT', body: JSON.stringify(newExpiry) });
        showToast("Updated"); fetchKeys();
    }

    async function deleteKey(key, silent = false) {
        if (!silent && !confirm("Delete " + key + "?")) return;
        await fetch(`${DB_URL}/${key}.json?auth=${DB_SECRET}`, { method: 'DELETE' });
        if (!silent) showToast("Deleted"); fetchKeys();
    }
</script>
</body>
</html>
